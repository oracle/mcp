name: Build and Test
on:
  push:
    branches:
      - "main"
  pull_request:
    branches:
      - "main"
jobs:
  build:
    runs-on: ubuntu-latest
    needs: get_changed_projects
    strategy:
      matrix:
        include: ${{ fromJson(needs.get_changed_projects.outputs.projects) }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: No changed projects
        if: ${{ matrix.skip }}
        run: echo "No changed projects to build."

      - name: Set up Python
        if: ${{ !matrix.skip }}
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install requirements
        if: ${{ !matrix.skip }}
        run: pip install -r requirements-dev.txt

      - name: Sync
        if: ${{ !matrix.skip }}
        run: python -m joist run sync ${{ matrix.project }}

      - name: Test and Coverage
        if: ${{ !matrix.skip }}
        run: python -m joist run test ${{ matrix.project }} --no-cache

      - name: Build
        if: ${{ !matrix.skip }}
        run: python -m joist run build ${{ matrix.project }} --no-cache

      - name: Test install
        if: ${{ !matrix.skip }}
        run: python -m joist run install ${{ matrix.project }}

      - name: Upload coverage report
        if: ${{ !matrix.skip }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.directory }}-coverage-report
          path: |
            src/${{ matrix.directory }}/htmlcov/*
            .coverage.${{ matrix.project }}
          include-hidden-files: true

  get_changed_projects:
    runs-on: ubuntu-latest
    outputs:
      projects: ${{ steps.get_projects.outputs.projects }}
      has_projects: ${{ steps.get_projects.outputs.has_projects }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install requirements
        run: pip install -r requirements-dev.txt

      - name: Get changed Joist projects
        id: get_projects
        env:
          BASE_REF: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}
        run: |
          python - <<'PY'
          import json
          import os
          import subprocess
          import sys

          base = os.environ["BASE_REF"]
          if not base or base == "0" * 40:
              command = [sys.executable, "-m", "joist", "list", "--json"]
              reason = "no usable base ref; selected all projects"
          else:
              command = [sys.executable, "-m", "joist", "list", "--since", base, "--json"]
              reason = f"selected projects changed since {base}"

          payload = json.loads(subprocess.check_output(command, text=True))

          matrix = [
              {
                  "project": name,
                  "directory": project["root"].removeprefix("src/"),
                  "skip": False,
              }
              for name, project in sorted(payload["projects"].items())
          ]
          output_matrix = matrix or [{"project": "none", "directory": "none", "skip": True}]

          print(f"Joist command: {' '.join(command)}", file=sys.stderr)
          print(f"Selection reason: {reason}", file=sys.stderr)
          print(f"Selected projects: {json.dumps([item['project'] for item in matrix])}", file=sys.stderr)

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output:
              output.write(f"projects={json.dumps(output_matrix)}\n")
              output.write(f"has_projects={'true' if matrix else 'false'}\n")
          PY

  combined-coverage:
    runs-on: ubuntu-latest
    needs:
      - get_changed_projects
      - build
    if: ${{ needs.get_changed_projects.outputs.has_projects == 'true' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install requirements
        run: pip install -r requirements-dev.txt

      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: '*-coverage-report' # Downloads all artifacts starting with 'my-artifact-'
          merge-multiple: true # Merges the contents of multiple artifacts into a single directory

      - name: Combine Coverage reports
        run: |
          make combine-coverage

      - name: Upload combined reports
        uses: actions/upload-artifact@v4
        with:
          name: all-in-one-coverage-report
          path: |
            oracle-mcp-coverage-report/*
            .coverage
          include-hidden-files: true
