name: Build and Test
on:
  push:
    branches:
      - "main"
  pull_request:
    branches:
      - "main"
jobs:
  build:
    runs-on: ubuntu-latest
    needs: get-directories
    strategy:
      matrix:
        include: ${{ fromJson(needs.get-directories.outputs.projects) }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install requirements
        run: pip install -r requirements-dev.txt

      - name: Sync
        run: python -m joist run sync ${{ matrix.project }}

      - name: Test and Coverage
        run: python -m joist run test ${{ matrix.project }} --no-cache

      - name: Build
        run: python -m joist run build ${{ matrix.project }} --no-cache

      - name: Test install
        run: python -m joist run install ${{ matrix.project }}

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.directory }}-coverage-report
          path: |
            src/${{ matrix.directory }}/htmlcov/*
            .coverage.${{ matrix.project }}
          include-hidden-files: true

  get-directories:
    runs-on: ubuntu-latest
    outputs:
      projects: ${{ steps.get-projects.outputs.projects }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install requirements
        run: pip install -r requirements-dev.txt

      - name: Get Joist projects
        id: get-projects
        run: |
          projects=$(python - <<'PY'
          import json
          import subprocess

          payload = json.loads(
              subprocess.check_output(["python", "-m", "joist", "list", "--json"], text=True)
          )
          matrix = [
              {"project": name, "directory": project["root"].removeprefix("src/")}
              for name, project in sorted(payload["projects"].items())
          ]
          print(json.dumps(matrix))
          PY
          )
          echo "projects=$projects" >> "$GITHUB_OUTPUT"

  combined-coverage:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install requirements
        run: pip install -r requirements-dev.txt

      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: '*-coverage-report' # Downloads all artifacts starting with 'my-artifact-'
          merge-multiple: true # Merges the contents of multiple artifacts into a single directory

      - name: Combine Coverage reports
        run: |
          make combine-coverage

      - name: Upload combined reports
        uses: actions/upload-artifact@v4
        with:
          name: all-in-one-coverage-report
          path: |
            oracle-mcp-coverage-report/*
            .coverage
          include-hidden-files: true
